<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ToDoApp</title>
    <script type="module" src="./index.js"></script>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header>
      <section class="creation__buttons">
        <button type="button" class="add__button" id="button-task">
          <img
            src="./assets/add_project.svg"
            alt="icon showing new project"
            class="creation__button"
          />
        </button>
        <button type="button" class="add__button" id="button-project">
          <img
            src="./assets/add_task.svg"
            alt="icon showing new task"
            class="creation__button"
          />
        </button>
      </section>
    </header>
    <aside class="aside">
      <section class="profile">
        <p>Personal ToDo List</p>
      </section>
      <section class="projects">
        <p class="projects__heading">Projects</p>
        <section class="projects__list"></section>
      </section>
    </aside>
    <main class="main">
      <h1 class="current__project"></h1>
      <section class="tasks__list"></section>
    </main>
  </body>
</html>
